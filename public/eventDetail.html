<!DOCTYPE html>
<html lang="en">
<head>
    <title>Event | StudentLink</title>

    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" type="image/png" href="styles/images/ICON.png">
    <link rel="stylesheet" href="styles/explore.css">

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body id="documentBody">

<!-- HEADER -->
<div id="header">
    <img id="logo" src="styles/images/STUDENT_LINK_LOGO.svg">
</div>

<!-- MAIN CONTENT -->
<div id="explorePage" class="content">

    <!-- TITLE -->
    <h2 class="sectionTitle">Event</h2>

    <div id="campusCentralPage">
        <!-- TOP SECTION -->
        <div class="eventTop">

            <img id="eventImage">

            <div class="eventTopInfo">
                <h1 id="eventTitle"></h1>

                <p id="eventDate"></p>
                <p id="eventLocation"></p>
            </div>

        </div>

        <hr>
        <!-- MAIN CONTENT -->
        <div class="eventMain">

            <!-- LEFT -->
            <div class="eventLeft">
                <h2>Description</h2>
                <p id="eventDescription"></p>
            </div>

            <!-- RIGHT RSVP -->
            <div class="eventRight">
                <div class="rsvpBox">
                    <h3>RSVP to Event</h3>
                    <p id="rsvpCount">0 going</p>

                    <button id="rsvpBtn" class="primaryBtn">
                        RSVP
                    </button>
                </div>
            </div>

        </div>

        <hr>
        <!-- HOST ORG -->
        <h2>Host Organization</h2>
        <div id="hostOrgCard" class="orgCard"></div>

        <hr>
        <!-- RELATED EVENTS -->
        <h2>Other events from this organization</h2>
        <div id="relatedEvents" class="eventsGrid"></div>

    </div>

</div>

<!-- SIDEBAR (EXACT SAME AS EVENTS PAGE) -->
<div class="sidebar" id="leftBar">

<br>
<img class="sideProfileIcon" id="profilePic" src="styles/images/placeholder/PROFILE_DEFAULT_IMAGE.SVG"><br>

<p id="displayName">Display Name</p>
<p id="username">@Username</p><br>

<p class="sidebarText"><a href="home.html">Home</a></p>
<p class="sidebarText"><a href="listings.html">Listings</a></p>
<p class="sidebarText"><a href="explore.html">Explore</a></p>
<p class="sidebarText"><a href="notifications.html">Notifications</a></p>
<p class="sidebarText"><a href="chat.html">Chat</a></p>
<p class="sidebarText"><a href="profile.html">Profile</a></p>
<p class="sidebarText"><a href="settings.html">Settings</a></p>

</div>

<!-- SCRIPTS -->
<script type="module" src="js/eventDetail.js"></script>
<script src="js/themeSwap.js"></script>

</body>
</html>
