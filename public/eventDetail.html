<!DOCTYPE html>
<html lang="en">
<head>
    <title>Event | StudentLink</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- GLOBAL STYLES -->
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/explore.css">
</head>

<body id="documentBody">

<!-- APP LAYOUT -->
<div class="appLayout">

    <!-- SIDEBAR (MATCHES APP) -->
    <aside class="sidebar">

        <div class="sidebarTop">
            <h2 class="logoText">StudentLink</h2>
        </div>

        <div class="sidebarProfile">
            <img id="sidebarProfileImg" src="styles/images/PROFILE_DEFAULT_IMAGE.SVG">
            <span id="sidebarUsername">@username</span>
        </div>

        <nav class="sidebarNav">
            <a href="home.html">Home</a>
            <a href="listings.html">Listings</a>
            <a href="explore.html" class="active">Explore</a>
            <a href="chat.html">Chat</a>
            <a href="profile.html">Profile</a>
            <a href="settings.html">Settings</a>
        </nav>

    </aside>
    <!-- MAIN CONTENT -->
    <main class="mainContent">

        <!-- HEADER -->
        <div class="pageHeader">
            <h1>Event</h1>
        </div>

        <!-- EVENT PAGE -->
        <div id="campusCentralPage" class="pageContent">

            <!-- TOP SECTION -->
            <div class="eventTop">

                <img id="eventImage">

                <div class="eventTopInfo">
                    <h1 id="eventTitle"></h1>

                    <p id="eventDate"></p>
                    <p id="eventLocation"></p>
                </div>

            </div>

            <hr>

            <!-- MAIN CONTENT -->
            <div class="eventMain">

                <!-- LEFT -->
                <div class="eventLeft">
                    <h2>Description</h2>
                    <p id="eventDescription"></p>
                </div>

                <!-- RIGHT RSVP -->
                <aside class="eventRight">
                    <div class="rsvpBox">
                        <h3>RSVP to Event</h3>
                        <p id="rsvpCount">0 going</p>

                        <button id="rsvpBtn" class="themeObject">
                            RSVP
                        </button>
                    </div>
                </aside>

            </div>

            <hr>

            <!-- HOST ORG -->
            <section>
                <h2>Host Organization</h2>
                <div id="hostOrgCard" class="orgCard"></div>
            </section>

            <hr>

            <!-- OTHER EVENTS -->
            <section>
                <h2>Other events from this organization</h2>
                <div id="relatedEvents" class="eventsGrid"></div>
            </section>

        </div>

    </main>

</div>

<script type="module" src="js/eventDetail.js"></script>

</body>
</html>
