<!DOCTYPE html>
<html>
<head>
    <title>Home | StudentLink</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/explore.css">
    <meta name="viewport" content="width=device-width, inital-scale=1">
</head>
<body id="documentBody">
    <div id="header">
        <img id="logo" src="styles/images/STUDENT_LINK_LOGO.svg">
    </div><br><br>

    <div id="exploreHome" class="content">
        <input class="searchBar themeObject" id="exploreSearchBar" placeholder="Search"><br>
        <select class="exploreBar themeObject" id="filterSelection"><br>
            <option selected disabled hidden>Select Search Filter</option>
            <option>Posts</option>
            <option>Listings</option>
            <option>Users</option>
        </select>
        <div id="recentSearches">
            <table class="recentSearchesTable" style="width:100%;">
                <tr><th id="recentHeader">Recent Searches</th></tr>
                <tr><th class="recentExploreSearchData"><a class="tableAnchorLink" href="">game club</a></th></tr>
                <tr><th class="recentExploreSearchData"><a class="tableAnchorLink" href="">textbooks</a></th></tr>
                <tr><th class="recentExploreSearchData"><a class="tableAnchorLink" href="">class canceled</a></th></tr>
                <tr><th class="recentExploreSearchData"><a class="tableAnchorLink" href="">senior project</a></th></tr>
                <tr><th class="recentExploreSearchData"><a class="tableAnchorLink" href="">used calculator</a></th></tr>
            </table>
        </div>
    </div><br><br>

    <!-- SAMPLE POST 1-->
    <p>Posts:</p>
    <div class="content" style="border-top:1px var(--border-color) solid; border-radius:10px">
        <button class="openBtn">
        <img class="profileImgMini" src="styles/images/placeholder/PROFILE_DEFAULT_IMAGE.SVG"> 
        <a class="postLink" class="postDisplayName" href="">Display Name </a><small class="smallTxt">@Username</small><br>

        <p class="postContentText" maxlength="200">How did you guys do on the BCS 315 midterm? It was super easy!</p><br>

        <footer><a class="postLink postMetrics" href="">40 Likes</a><a class="postLink postMetrics" href="">6 Comments</a>
        <a href="" class="postLink postMetrics" style="text-align: right;">Report</a></footer><br>
    </div><br>

    <!-- SAMPLE LISTING 1 -->
    <p>Listings:</p>
    <div class="content" style="border-top:1px var(--border-color) solid; border-radius:10px">
        <button class="openBtn">
        <p style="text-align:center">Sold by: <a class="postLink" class="postDisplayName" href="">Display Name </a><small class="smallTxt">@Username</small></p><br>
        <img class="exploreListing" src="styles/images/placeholder/textbooks.png" style="margin-top: 1%;"> 

        <p class="postContentText" maxlength="200" style="text-align: center;">Textbook - Unix Operating Systems</p>
        <p class="postContentText" maxlength="200" style="text-align: center;"><a style="text-decoration: none;" href="#">$60</a></p>

        
    </div><br>

    <!-- SAMPLE USER 1-->
    <p>Users:</p>
    <div class="content" style="border-top:1px var(--border-color) solid; border-radius:10px">
        <button class="openBtn">
        <img class="profileImgMini" src="styles/images/placeholder/PROFILE_DEFAULT_IMAGE.SVG" style="margin-left:47.5%"><br>
        <p style="text-align:center"><a class="postLink" class="postDisplayName" href="">Display Name </a><small class="smallTxt">@Username</small></p><br>
    </div><br>



    <!-- LEFT SIDEBAR -->

    <div class="sidebar" id="leftBar">
        <br><img class="sideProfileIcon" src="styles/images/placeholder/PROFILE_DEFAULT_IMAGE.SVG"><br>
        <p id="displayName">Display Name</p>
        <p id="username">@Username</p><br>
        <p class="sidebarText"><a href="home.html">Home</a></p>
        <p class="sidebarText"><a href="listings.html">Listings</a></p>
        <p class="sidebarText"><a href="explore.html">Explore</a></p>
        <p class="sidebarText"><a href="notifications.html">Notifications</a></p>
        <p class="sidebarText"><a href="chat.html">Chat</a></p>
        <p class="sidebarText"><a href="profile.html">Profile</a></p>
        <p class="sidebarText"><a href="settings.html">Settings</a></p>
        <button class="themeObject" id="newPostBtn" onclick="toggleOverlay('newPostContainer')">New Post</button><br><br>
        

        <div class="overlayDiv">
            <div id="newPostContainer">
                <p id="newPostHeader"><button class="themeObject" id="closeNewPostBtn" onclick="toggleOverlay('newPostContainer')">X</button> <!-- Close Button -->
                <b>Create New Post</b><button class="themeObject" id="createPostBtn" onclick="toggleOverlay('newPostContainer')" onclick="toggleOverlay('newPostContainer')">Post</button></p>
                <div id="newPostTXT"><textarea  maxlength="300" placeholder="What's happening?"></textarea></div>
            </div>
        </div>

    </div>

    <script type="module" src="js/userSearch.js"></script>
    <script src="js/themeSwap.js" type="text/javascript"></script>
    <script src="js/toggleVis.js" type="text/javascript"></script>
</body>
</html>
