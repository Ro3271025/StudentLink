<!DOCTYPE html>

<html lang="en">
<head>
    <title>Explore | StudentLink</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" type="image/png" href="styles/images/ICON.png">
    <link rel="stylesheet" href="styles/explore.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body id="documentBody">

<!-- HEADER -->

<div id="header">
    <img id="logo" src="styles/images/STUDENT_LINK_LOGO.svg">
</div>

<!-- MAIN -->

<div id="explorePage" class="content">

<!-- SEARCH -->
<input class="searchBar themeObject" id="exploreSearchBar" placeholder="Search StudentLink...">

<!-- FILTER -->
<select class="exploreBar themeObject" id="filterSelection">
    <option value="all">All</option>
    <option value="posts">Posts</option>
    <option value="listings">Listings</option>
</select>

<!-- RECENT -->
<div id="recentSearches">
    <p class="sectionTitle">Recent Searches</p>
    <div id="recentContainer"></div>
</div>

<!-- CAMPUS CENTRAL -->
<h2 class="sectionTitle">Campus Central</h2>

<div class="centralTopCards">
    <div class="centralCard" id="orgCard">Organizations</div>
    <div class="centralCard" id="eventCard">Events</div>
    <div class="centralCard" id="newsCard">News</div>
</div>

<!-- FEED -->
<h2 class="sectionTitle">Explore Feed</h2>
<div id="exploreFeed"></div>

</div>

<!-- SIDEBAR -->

<div class="sidebar" id="leftBar">

<br>
<img class="sideProfileIcon" id = "profilePic" src="styles/images/placeholder/PROFILE_DEFAULT_IMAGE.SVG"><br>

<p id="displayName">Display Name</p>
<p id="username">@Username</p><br>

<p class="sidebarText"><a href="home.html">Home</a></p>
<p class="sidebarText"><a href="listings.html">Listings</a></p>
<p class="sidebarText"><a href="explore.html">Explore</a></p>
<p class="sidebarText"><a href="notifications.html">Notifications</a></p>
<p class="sidebarText"><a href="chat.html">Chat</a></p>
<p class="sidebarText"><a href="profile.html">Profile</a></p>
<p class="sidebarText"><a href="settings.html">Settings</a></p>

</div>

<script type="module" src="js/explore.js"></script>

<script src="js/themeSwap.js"></script>

    <script type="module" src="js/userSearch.js"></script>
    <script type="module">
        import { setupSidebar } from "./js/showUser.js";
        setupSidebar();
    </script>
    <script src="js/themeSwap.js" type="text/javascript"></script>
    <script src="js/toggleVis.js" type="text/javascript"></script>
</body>
</html>
