<!DOCTYPE html>
<html lang="en">
<head>
    <title>Marketplace | StudentLink</title>
    <link rel="stylesheet" href="styles/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body id="documentBody">

    <!-- HEADER -->
    <div id="header">
        <img id="logo" src="styles/images/placeholder/DEFAULT_BANNER.svg">
    </div>

   <div class="mainContent">
        <h1>Marketplace Listings</h1>

        <div id="listingsContainer">
        Loading listings...
        </div>
    </div>

    <!-- LEFT SIDEBAR -->
    <div class="sidebar" id="leftBar">
        <br>

        <p class="sidebarText"><a href="home.html">Home</a></p>
        <p class="sidebarText"><a href="listings.html"><strong>Listings</strong></a></p>
        <p class="sidebarText"><a href="#">Explore</a></p>
        <p class="sidebarText"><a href="#">Notifications</a></p>
        <p class="sidebarText"><a href="#">Chat</a></p>
        <p class="sidebarText"><a href="profile.html">Profile</a></p>
        <p class="sidebarText"><a href="#">Settings</a></p>

        <button class="themeObject" onclick="window.location.href='createListing.html'">
            New Listing
        </button>

        <br><br>

        <p>Theme</p>

        <select id="themeSelector" class="themeObject" onchange="changeTheme()">
            <option value="#0f73ff" selected>Blue</option>
            <option value="#A11010">Red</option>
            <option value="#E86C13">Orange</option>
            <option value="#A947C9">Purple</option>
            <option value="#004a41">Green</option>
        </select>

        <br><br>

        <select id="bgSelector" class="themeObject" onchange="changeBG()">
            <option value="#000000">Lights Out</option>
            <option value="#F2F2EB">Light</option>
            <option value="#151D28" selected>Dark</option>
        </select>
    </div>

    <!-- RIGHT SIDEBAR (Optional but consistent) -->
    <div class="sidebar" id="rightBar">
        <br>
        <input class="searchBar themeObject" placeholder="Search"><br><br>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/listings.js"></script>
    <script src="js/themeSwap.js"></script>

</body>
</html>
