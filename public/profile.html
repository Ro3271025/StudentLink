<!DOCTYPE html>
<html lang="en">

<head>
<title>Profile | StudentLink</title>
<link rel="stylesheet" href="styles/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body id="documentBody">
    <!-- TODO: Fix scaling on elements -->

    <div id="profileContainer">
        <div id="banner"><img src="styles/images/placeholder/DEFAULT_BANNER.svg"></div> <!-- Just for the banner, that's it -->

        <div id="profileInfo" class="content">
            <!-- Maybe use an inner div to force content to scale without more custom code -->
            <img id="profileImage" src="styles/images/placeholder/PROFILE_DEFAULT_IMAGE.SVG">
            <p id="displayName">Display Name</p> <!-- Swap with input for editing --> <!-- <input id="displayName"> -->
            <p id="username">@Username <button id="userCollege" class="themeObject">SUNY Farmingdale</button></p> <!-- Remove the uni "button?" -->
            <!-- Replace the static numbers with actual data and then link to a page showing all the results of the proper query -->
            <p id="userStats">Posts: <a href="">99.9k</a> Followers: <a href="">99.9k</a> Following: <a href="">99.9k</a></p> <!-- # of followers / friends, # of posts, etc... -->
            <div id="userBio">
                <!-- Use a textarea for "editing" mode, remove the disabled property when editing -->
                <button id="edit" class="themeObject">Edit Profile</button> <!-- <button id="userActions">...</button>--> <!-- Use this other button for other user's viewing -->
                <!-- <button id="save">Save</button> <button id="cancel">cancel</button> --> <!-- Swap in after clicking edit -->
                <textarea id="bioText" maxlength="500" rows="5" cols="50" disabled>Hi my name is Display Name! I'm a student at FSC majoring in [UNDEFINED]. #motorsports #esports #sunyfsc</textarea>
                </div>
        </div>

        <div id="userContent">
            <table colspan="5" border="0" cellpadding="2" cellspacing="1" id="selectedContentList"> <!-- TODO: FIX SCALING -->
                <th>Posts</th> <!-- TODO: Make these have buttons -->
                <th>Comments</th>
                <th>Listings</th>
            </table>
        </div>

    <button id="loadMore" class="themeObject">Load More Posts</button> <!-- dynamically show when the user gets roughly 66% down the page of posts -->
    
    <div class="sidebar" id="leftBar"> <!-- Left Sidebar -->
        <br><img class="sideProfileIcon" src="styles/images/placeholder/PROFILE_DEFAULT_IMAGE.SVG"><br>
        <p id="displayName">Display Name</p>
        <p id="username">@Username</p><br>
        <p class="sidebarText"><a href="home.html">Home</a></p>
        <p class="sidebarText"><a href="listings.html">Listings</a></p>
        <p class="sidebarText">Explore</p>
        <p class="sidebarText">Notifications</p>
        <p class="sidebarText"><a href="chat.html">Chat</a></p>
        <p class="sidebarText"><a href="profile.html">Profile</a></p>
        <p class="sidebarText"><a href="settings.html">Settings</a></p><br><br>
        <button class="themeObject" onclick="toggleOverlay('newPostContainer')">New Post</button><br><br>

        <div class="overlayDiv">
            <div id="newPostContainer">
                <p id="newPostHeader"><button class="themeObject" id="closeNewPostBtn" onclick="toggleOverlay('newPostContainer')">X</button>
                <b>Create New Post</b><button class="themeObject" id="createPostBtn" onclick="toggleOverlay('newPostContainer')">Post</button></p>
                <div id="newPostTXT"><textarea  maxlength="300" placeholder="What's happening?"></textarea></div>
            </div>
        </div>

    </div>

    <div class="sidebar" id="rightBar"> <!-- Right Sidebar -->
        <br><input class="searchBar themeObject" placeholder="Search"><br><br>
        
        <div id="recentSearches"> <!-- track the last 5 searches -->
            <table class="recentSearchesTable">
                <tr><th id="recentHeader">Recent Searches</th></tr>
                <tr>
                    <th class="recentSearchData"><a class="tableAnchorLink" href="">game club</a></th>
                </tr>
                <tr>
                    <th class="recentSearchData"><a class="tableAnchorLink" href="">textbooks</a></th>
                </tr>
                <tr>
                    <th class="recentSearchData"><a class="tableAnchorLink" href="">class canceled</a></th>
                </tr>
                <tr>
                    <th class="recentSearchData"><a class="tableAnchorLink" href="">senior project</a></th>
                </tr>
                <tr>
                    <th class="recentSearchData"><a class="tableAnchorLink" href="">used calculator</a></th>
                </tr>
            </table>
        </div>
    </div>

    

    <script type="module">
        import { setupProfile } from "./js/profile.js";
        setupProfile();
    </script>
    <script src="js/themeSwap.js" type="text/javascript"></script>
    <script src="js/toggleVis.js" type="text/javascript"></script>
