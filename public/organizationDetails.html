<!DOCTYPE html>
<html lang="en">
<head>
    <title>Organization | StudentLink</title>

    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" type="image/png" href="styles/images/ICON.png">
    <link rel="stylesheet" href="styles/explore.css">

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body id="documentBody">
<!-- HEADER -->
<div id="header">
    <img id="logo" src="styles/images/STUDENT_LINK_LOGO.svg">
</div>

<!-- MAIN CONTENT -->
<div id="explorePage" class="content">

    <h2 class="sectionTitle">Organization</h2>

    <div id="campusCentralPage">
        <!-- TOP SECTION (MAIN LAYOUT) -->
        <div class="orgTopLayout">

            <!-- LEFT SIDE -->
            <div class="orgLeft">
                <!-- HEADER -->
                <div class="orgHeader">
                    <img id="orgProfileImg" src="styles/images/placeholder/PROFILE_DEFAULT_IMAGE.SVG">

                    <div>
                        <h1 id="orgName">Organization Name</h1>
                        <p id="memberCount">0 members</p>
                    </div>
                </div>
                <!-- ACTION BUTTONS -->
                <div class="orgActions">
                    <button id="joinBtn" class="primaryBtn">Join</button>
                    <button id="contactBtn" class="secondaryBtn">Contact</button>
                </div>
                <!-- DESCRIPTION -->
                <p id="orgDescription">
                    Organization description will appear here.
                </p>
                <!-- CONTACT -->
                <div class="orgContact">
                    <h3>Contact Information</h3>
                    <p><strong>Email:</strong> <span id="orgEmail"></span></p>
                </div>

            </div>
            <!-- RIGHT SIDE (GALLERY) -->
            <div class="orgRight">
                <div id="orgGallery" class="orgGallery">
                    <!-- Images injected by JS -->
                </div>
            </div>

        </div>
        <!-- EVENTS -->
        <div class="orgSection">
            <div class="sectionHeader">
                <h2>All Events</h2>
            </div>

            <div id="orgEvents" class="eventsGrid"></div>
        </div>
        <!-- OFFICERS -->
        <div class="orgSection">
            <div class="sectionHeader">
                <h2>Officers</h2>
            </div>

            <div id="orgOfficers" class="orgOfficers"></div>
        </div>

    </div>

</div>
<!-- SIDEBAR (MATCHES EVENTS PAGE) -->
<div class="sidebar" id="leftBar">

<br>
<img class="sideProfileIcon" id="profilePic" src="styles/images/placeholder/PROFILE_DEFAULT_IMAGE.SVG"><br>

<p id="displayName">Display Name</p>
<p id="username">@Username</p><br>

<p class="sidebarText"><a href="home.html">Home</a></p>
<p class="sidebarText"><a href="listings.html">Listings</a></p>
<p class="sidebarText"><a href="explore.html">Explore</a></p>
<p class="sidebarText"><a href="notifications.html">Notifications</a></p>
<p class="sidebarText"><a href="chat.html">Chat</a></p>
<p class="sidebarText"><a href="profile.html">Profile</a></p>
<p class="sidebarText"><a href="settings.html">Settings</a></p>

</div>
<!-- SCRIPTS -->
<script type="module" src="js/organizationDetail.js"></script>
<script src="js/themeSwap.js"></script>

</body>
</html>
