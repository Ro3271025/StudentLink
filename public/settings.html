<!DOCTYPE html>
<html>
<head>
    <title>Settings | StudentLink</title>
    <link rel="stylesheet" href="styles/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body id="documentBody">

    <div id="header">
        <img id="logo" src="styles/images/placeholder/DEFAULT_BANNER.svg">
    </div>

    <div class="content">
        <br>
        <p class="settingsHeader">
            Settings<br>
            <small class="smallTxt" id="headerUsername">@Username</small>
        </p>

        <p id="accOption">
            <button class="openBtn optionTxt" onclick="expandAcc()">
                Your Account<br>
                <small class="smallTxt">
                    See information about your account and update details
                </small>
            </button>
        </p>

        <p>
            <button class="openBtn optionTxt">
                Privacy<br>
                <small class="smallTxt">
                    Manage your account's security and interactions with other users
                </small>
            </button>
        </p>

        <p id="themeOption">
            <button class="openBtn optionTxt" onclick="expandTheme()">
                Appearance<br>
                <small class="smallTxt">
                    Change your color scheme or background
                </small>
            </button>
        </p>

        <p>
            <button class="openBtn optionTxt">
                Support<br>
                <small class="smallTxt">
                    FAQ and troubleshooting
                </small>
            </button>
        </p>

        <p id="aboutOption">
            <button class="openBtn optionTxt" onclick="expandAbout()">
                About<br>
                <small class="smallTxt">
                    View application information
                </small>
            </button>
        </p>
    </div>

    
    <div class="sidebar" id="leftBar">
        <br>
        <img class="sideProfileIcon" src="styles/images/placeholder/PROFILE_DEFAULT_IMAGE.SVG"><br>
        <p id="displayName">Display Name</p>
        <p id="username">@Username</p><br>

        <p class="sidebarText"><a href="home.html">Home</a></p>
        <p class="sidebarText"><a href="listings.html">Listings</a></p>
        <p class="sidebarText"><a href="explore.html">Explore</a></p>
        <p class="sidebarText"><a href="notifications.html">Notifications</a></p>
        <p class="sidebarText"><a href="chat.html">Chat</a></p>
        <p class="sidebarText"><a href="profile.html">Profile</a></p>
        <p class="sidebarText"><a href="settings.html">Settings</a></p>
    </div>


    <div class="sidebar" id="rightBar">
        <br><input class="searchBar themeObject" placeholder="Search"><br><br>
    </div>

    
    <script type="module">
        import { setupSidebar } from "./js/showUser.js";
        setupSidebar();
    </script>

    <script type="module" src="js/settingsOptions.js"></script>

 
    <script src="js/themeSwap.js"></script>

</body>
</html>
