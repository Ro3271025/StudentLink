<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/explore.css">

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body id="documentBody">

<!-- HEADER -->
<div id="header">
    <img id="logo" src="styles/images/STUDENT_LINK_LOGO.svg">
</div>

<!-- MAIN CONTENT -->
<div id="explorePage" class="content">

    <!-- TITLE -->
    <h2 class="sectionTitle">Events</h2>

    <!-- LAYOUT -->
    <div class="eventsLayout">

        <!-- LEFT FILTER -->
        <div class="eventSidebar">

            <input 
                id="eventSearch" 
                class="exploreSearchBar"
                placeholder="Search events..."
            >

            <label>
                <input type="checkbox" id="onlineOnly">
                Online
            </label>

        </div>

        <!-- RIGHT CONTENT -->
        <div id="eventsContainer" class="eventsGrid"></div>

    </div>

</div>

<!-- SIDEBAR -->
<div class="sidebar" id="leftBar">

<br>
<img class="sideProfileIcon" id="profilePic" src="styles/images/placeholder/PROFILE_DEFAULT_IMAGE.SVG"><br>

<p id="displayName">Display Name</p>
