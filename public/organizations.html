<!DOCTYPE html>
<html lang="en">
<head>
    <title>Organizations | StudentLink</title>

    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/explore.css">

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body id="documentBody">

<!-- SIDEBAR -->
<div id="sidebar">

    <div id="sidebarTop">
        <img id="sidebarProfileImg" src="styles/images/placeholder/PROFILE_DEFAULT_IMAGE.svg">
        <span id="sidebarUsername">@username</span>
    </div>

    <div id="sidebarLinks">
        <a href="home.html">Home</a>
        <a href="listings.html">Listings</a>
        <a href="explore.html" class="active">Explore</a>
        <a href="chat.html">Chat</a>
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
    </div>

</div>

<!-- MAIN -->
<div id="campusCentralPage">

    <!-- HEADER -->
    <div class="pageHeader">
        <h2>Organizations</h2>
    </div>

    <!-- CONTENT -->
    <div class="orgLayout">

        <!-- LEFT SIDEBAR -->
        <div class="orgSidebar">

            <input 
                type="text" 
                id="orgSearchInput" 
                placeholder="Search organizations..."
            >

            <div class="filterGroup">
                <label>Category</label>
                <select id="categoryFilter">
                    <option value="">All</option>
                    <option value="academic">Academic</option>
                    <option value="sports">Sports</option>
                    <option value="cultural">Cultural</option>
                </select>
            </div>

            <button id="createOrgBtnUI" class="primaryBtn">
                + Create Organization
            </button>

        </div>

        <!-- RIGHT -->
        <div id="orgContainer" class="orgList"></div>

    </div>

</div>

<script type="module" src="js/organizations.js"></script>

</body>
</html>
